<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice My Idea</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:transparent;color:#f0f2f5;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* Glass title bar */
.title-bar{display:flex;align-items:center;padding:14px 20px;gap:10px;min-height:54px;-webkit-app-region:drag;background:rgba(11,12,18,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.04)}
.title-bar>*{-webkit-app-region:no-drag}
.app-icon{width:28px;height:28px;background:linear-gradient(135deg,#c084fc,#7c3aed);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700}
.app-info{display:flex;flex-direction:column;gap:1px}
.app-name{font-size:13px;font-weight:700;letter-spacing:-0.2px;color:#f0f2f5}
.app-version{font-size:9px;color:#6b7280;letter-spacing:0.3px}
.window-controls{display:flex;gap:6px;margin-left:auto}
.ctrl-btn{width:26px;height:26px;border-radius:6px;background:transparent;color:#6b7280;border:none;font-size:12px;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center}
.ctrl-btn:hover{background:rgba(255,255,255,0.06);color:#f0f2f5}
.ctrl-btn.close:hover{background:#ef4444;color:#fff}

/* Status bar */
.status-bar{display:flex;align-items:center;padding:8px 20px;gap:10px;background:rgba(11,12,18,0.5);border-bottom:1px solid rgba(255,255,255,0.03)}
.status-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;transition:.3s}
.status-dot.recording{background:#ef4444;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.status-label{font-size:11px;color:#6b7280;font-weight:500}
.status-label.active{color:#22c55e}
.timer{font-size:11px;color:#6b7280;margin-left:auto;font-variant-numeric:tabular-nums}

/* Main content */
.content{flex:1;padding:20px;display:flex;flex-direction:column;gap:14px;background:rgba(11,12,18,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

/* Mode cards */
.mode-selector{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.mode-card{padding:8px 4px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);text-align:center;cursor:pointer;transition:.15s;font-size:10px;color:#6b7280}
.mode-card:hover{background:rgba(192,132,252,0.08);border-color:rgba(192,132,252,0.15)}
.mode-card.active{background:rgba(192,132,252,0.12);border-color:rgba(192,132,252,0.25);color:#c084fc}
.mode-card .icon{font-size:16px;display:block;margin-bottom:3px}
.mode-card .label{font-size:9px;font-weight:500}

/* Transcript area */
.transcript-area{flex:1;position:relative}
textarea{width:100%;height:100%;background:rgba(0,0,0,0.3);color:#f0f2f5;border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:18px;font-size:14px;font-family:inherit;resize:none;outline:none;line-height:1.7;transition:.2s}
textarea:focus{border-color:rgba(192,132,252,0.2);background:rgba(0,0,0,0.4)}
textarea::placeholder{color:#6b7280}

/* Waveform visualization */
.waveform{height:40px;margin-bottom:-4px;display:flex;align-items:center;justify-content:center;gap:2px;opacity:0;transition:.3s}
.waveform.active{opacity:1}
.wave-bar{width:3px;border-radius:2px;background:linear-gradient(180deg,#c084fc,#7c3aed);transition:height .1s;min-height:4px}

/* Control row */
.controls{display:flex;gap:8px}
.record-btn{flex:1;background:linear-gradient(135deg,#c084fc,#7c3aed);color:#fff;border:none;border-radius:10px;padding:13px 20px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s;letter-spacing:0.2px;position:relative;overflow:hidden}
.record-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);transition:.5s}
.record-btn:hover::before{left:100%}
.record-btn:hover{box-shadow:0 4px 24px rgba(124,58,237,0.3);transform:translateY(-1px)}
.record-btn.recording{background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 0 0 0 rgba(239,68,68,0.4);animation:pulse-ring 1.5s infinite}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0);100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}}

.action-btn{background:rgba(255,255,255,0.04);color:#8a9bb5;border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:8px 14px;font-size:11px;font-family:inherit;cursor:pointer;transition:.15s;white-space:nowrap}
.action-btn:hover{background:rgba(192,132,252,0.1);border-color:rgba(192,132,252,0.2);color:#c084fc}

/* Quick actions */
.quick-actions{display:flex;gap:6px;flex-wrap:wrap}
.qa-btn{padding:6px 12px;border-radius:6px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);color:#6b7280;font-size:10px;font-family:inherit;cursor:pointer;transition:.12s}
.qa-btn:hover{background:rgba(192,132,252,0.08);color:#c084fc;border-color:rgba(192,132,252,0.15)}

/* Footer */
.footer{display:flex;justify-content:space-between;padding:8px 20px 12px;font-size:9px;color:#6b7280;background:rgba(11,12,18,0.75);border-top:1px solid rgba(255,255,255,0.03)}
.footer .hotkey{color:#6b7280}
.footer .hotkey span{background:rgba(255,255,255,0.04);padding:2px 6px;border-radius:3px;font-size:8px}
</style>
</head>
<body>
<!-- Title -->
<div class="title-bar">
    <div class="app-icon">V</div>
    <div class="app-info">
        <span class="app-name">Voice My Idea</span>
        <span class="app-version">Voice Assistant · Alt+Space</span>
    </div>
    <div class="window-controls">
        <button class="ctrl-btn" onclick="electronAPI.minimizeWindow()" title="Hide to tray">＿</button>
        <button class="ctrl-btn close" onclick="electronAPI.quitApp()" title="Quit">✕</button>
    </div>
</div>

<!-- Status -->
<div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label active" id="statusLabel">Ready</span>
    <span class="timer" id="timer">0:00</span>
</div>

<!-- Content -->
<div class="content">
    <!-- Mode selector -->
    <div class="mode-selector" id="modeSelector">
        <div class="mode-card active" data-mode="Voice" onclick="setMode(this)">
            <span class="icon">🎤</span>
            <span class="label">Voice</span>
        </div>
        <div class="mode-card" data-mode="Message" onclick="setMode(this)">
            <span class="icon">💬</span>
            <span class="label">Message</span>
        </div>
        <div class="mode-card" data-mode="Email" onclick="setMode(this)">
            <span class="icon">✉️</span>
            <span class="label">Email</span>
        </div>
        <div class="mode-card" data-mode="Meeting" onclick="setMode(this)">
            <span class="icon">📋</span>
            <span class="label">Meeting</span>
        </div>
        <div class="mode-card" data-mode="Bullets" onclick="setMode(this)">
            <span class="icon">📑</span>
            <span class="label">Bullets</span>
        </div>
    </div>

    <!-- Waveform -->
    <div class="waveform" id="waveform">
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
    </div>

    <!-- Transcript -->
    <div class="transcript-area">
        <textarea id="output" placeholder="Press Alt+Space or hold the record button..."></textarea>
    </div>

    <!-- Record -->
    <div class="controls">
        <button class="record-btn" id="recBtn" onmousedown="startRec()" onmouseup="stopRec()">🎤  Hold to Record</button>
        <button class="action-btn" onclick="pasteText()">📋 Paste</button>
        <button class="action-btn" onclick="copyText()">📄 Copy</button>
        <button class="action-btn" onclick="document.getElementById('output').value=''">🗑 Clear</button>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions">
        <button class="qa-btn" onclick="wrapText('Summarize: ')">✨ Summarize</button>
        <button class="qa-btn" onclick="wrapText('Reply: ')">↩ Reply</button>
        <button class="qa-btn" onclick="wrapText('Translate to Spanish: ')">🌎 Translate</button>
        <button class="qa-btn" onclick="wrapText('Make this formal: ')">👔 Formal</button>
        <button class="qa-btn" onclick="wrapText('Make this casual: ')">😊 Casual</button>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <span class="hotkey"><span>Alt+Space</span> to record · <span>Esc</span> to hide</span>
    <span>Voice My Idea · Electron</span>
</div>

<script>
let rec=false, mediaRec, chunks=[], stream, port=18925, timerInterval=null, seconds=0;
electronAPI.onToggleRecording(() => { if(rec) stopRec(); else startRec(); });

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') electronAPI.minimizeWindow();
});

function setMode(el) {
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

function startRec(){
    if(rec) return; rec=true; seconds=0;
    document.getElementById('recBtn').textContent='⏺  Recording...';
    document.getElementById('recBtn').className='record-btn recording';
    document.getElementById('statusDot').className='status-dot recording';
    document.getElementById('statusLabel').textContent='Recording';
    document.getElementById('waveform').classList.add('active');
    startTimer(); animateWaveform();
    
    navigator.mediaDevices.getUserMedia({audio:{channelCount:1,sampleRate:16000}}).then(s=>{
        stream=s; mediaRec=new MediaRecorder(s,{mimeType:'audio/webm'});
        mediaRec.ondataavailable=e=>chunks.push(e.data);
        mediaRec.onstop=()=>{
            stopTimer();
            document.getElementById('statusLabel').textContent='Transcribing';
            document.getElementById('waveform').classList.remove('active');
            const blob=new Blob(chunks,{mimeType:'audio/webm'});
            fetch(`http://127.0.0.1:${port}/transcribe`,{method:'POST',body:blob})
            .then(r=>r.json()).then(d=>{
                document.getElementById('output').value=d.text||'No speech detected';
                resetUI(); if(d.text) setTimeout(pasteText,300);
            }).catch(()=>{document.getElementById('output').value='Backend not connected';resetUI()});
            chunks=[];stream=null;
        };
        chunks=[];mediaRec.start();
    }).catch(()=>{document.getElementById('output').value='Microphone access denied';resetUI()});
}

function stopRec(){if(rec&&mediaRec&&mediaRec.state==='recording'){mediaRec.stop();rec=false;stream&&stream.getTracks().forEach(t=>t.stop());}}

function resetUI(){
    document.getElementById('recBtn').textContent='🎤  Hold to Record';
    document.getElementById('recBtn').className='record-btn';
    document.getElementById('statusDot').className='status-dot';
    document.getElementById('statusLabel').textContent='Ready';
}

function pasteText(){
    const t=document.getElementById('output').value;
    if(t){navigator.clipboard.writeText(t);electronAPI.pasteText(t);}
}

function copyText(){
    const t=document.getElementById('output').value;
    if(t){navigator.clipboard.writeText(t);document.getElementById('statusLabel').textContent='Copied!';}
}

function wrapText(prefix){
    const t=document.getElementById('output').value;
    if(t) document.getElementById('output').value = prefix + t;
}

function startTimer(){
    seconds=0; timerInterval=setInterval(()=>{
        seconds++; const m=Math.floor(seconds/60); const s=seconds%60;
        document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
}

function stopTimer(){clearInterval(timerInterval);document.getElementById('timer').textContent='0:00';}

function animateWaveform(){
    if(!rec) return;
    document.querySelectorAll('.wave-bar').forEach(bar => {
        const h = Math.floor(Math.random() * 24) + 4;
        bar.style.height = h + 'px';
    });
    requestAnimationFrame(() => setTimeout(animateWaveform, 120));
}
</script>
</body>
</html>
